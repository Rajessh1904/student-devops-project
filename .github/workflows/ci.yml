name: Basic CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show Files
        run: ls -la

      - name: Verify README Exists
        run: test -f README.md

      - name: Success
        run: echo "Pipeline executed successfully!"